services:
  deye-logger:
    build: .
    container_name: deye-logger
    restart: unless-stopped
    volumes:
      - ./config/deye.yml:/config/deye.yml:ro
      - ./data:/data
    environment:
      - TZ=Europe/Kiev
      - DEYE_LOGGER_HOST=${DEYE_LOGGER_HOST:-192.168.1.5}
      - DEYE_LOGGER_PORT=${DEYE_LOGGER_PORT:-8899}
      - DEYE_LOGGER_SN=${DEYE_LOGGER_SN}
      - DEYE_INFLUX_URL=${DEYE_INFLUX_URL:-http://influxdb:8086}
      - DEYE_INFLUX_TOKEN=${DEYE_INFLUX_TOKEN}
      - DEYE_INFLUX_ORG=${DEYE_INFLUX_ORG:-deye}
      - DEYE_INFLUX_BUCKET=${DEYE_INFLUX_BUCKET:-deye}
      - DEYE_MQTT_HOST=${DEYE_MQTT_HOST:-mqtt}
      - DEYE_MQTT_PORT=${DEYE_MQTT_PORT:-1883}
      - DEYE_MQTT_TOPIC=${DEYE_MQTT_TOPIC:-deye/metrics}
    command: ["--config", "/config/deye.yml", "-i", "30", "--influx"]
    networks:
      - deye-net

  influxdb:
    image: influxdb:2
    container_name: deye-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD:-admin123}
      - DOCKER_INFLUXDB_INIT_ORG=deye
      - DOCKER_INFLUXDB_INIT_BUCKET=deye
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DEYE_INFLUX_TOKEN:-deye-token-local}

  grafana:
    image: grafana/grafana:latest
    container_name: deye-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - influxdb

  mqtt:
    image: eclipse-mosquitto:2
    container_name: deye-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data

networks:
  deye-net:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
  mosquitto-data:
